name: AegisTrace CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Change to 17 if your pom.xml uses Java 17
          cache: maven

      - name: Build Project
        run: ./mvnw clean verify
