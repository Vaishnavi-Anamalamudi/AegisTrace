<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AegisTrace Incidents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/matrix.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app-shell">
    <aside class="side-rail">
        <div class="brand-mark">AT</div>
        <a class="rail-btn" href="/dashboard" title="Dashboard"><i data-lucide="layout-dashboard"></i></a>
        <a class="rail-btn active" href="/incidents" title="Incidents"><i data-lucide="siren"></i></a>
        <a class="rail-btn" href="/evidence" title="Evidence"><i data-lucide="fingerprint"></i></a>
        <a class="rail-btn" href="/threat-intel" title="Threat Intel"><i data-lucide="radar"></i></a>
    </aside>
    <main class="workspace">
        <header class="topbar">
            <div>
                <p class="eyebrow">Incident Response</p>
                <h1>Attack Reconstructions</h1>
            </div>
            <span class="status-pill warning"><i data-lucide="workflow"></i> Case Management</span>
        </header>

        <section class="module-grid">
            <article class="panel module-card" th:each="incident : ${incidents}">
                <div class="panel-heading">
                    <div>
                        <span class="section-kicker">Incident Case</span>
                        <h3 th:text="${incident.title}">APT-style VPN credential compromise</h3>
                    </div>
                    <span class="score-chip" th:text="${incident.riskScore + ' risk'}">91 risk</span>
                </div>
                <p th:text="${incident.summary}">Incident summary</p>
                <div class="detail-block">
                    <strong>Impact</strong>
                    <span th:text="${incident.impactAnalysis}">Business impact</span>
                </div>
                <div class="detail-block">
                    <strong>Remediation</strong>
                    <span th:text="${incident.remediationSteps}">Remediation steps</span>
                </div>
            </article>
        </section>
    </main>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
