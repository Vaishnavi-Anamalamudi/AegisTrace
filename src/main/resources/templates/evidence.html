<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AegisTrace Evidence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/matrix.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app-shell">
    <aside class="side-rail">
        <div class="brand-mark">AT</div>
        <a class="rail-btn" href="/dashboard" title="Dashboard"><i data-lucide="layout-dashboard"></i></a>
        <a class="rail-btn" href="/incidents" title="Incidents"><i data-lucide="siren"></i></a>
        <a class="rail-btn active" href="/evidence" title="Evidence"><i data-lucide="fingerprint"></i></a>
        <a class="rail-btn" href="/threat-intel" title="Threat Intel"><i data-lucide="radar"></i></a>
    </aside>
    <main class="workspace">
        <header class="topbar">
            <div>
                <p class="eyebrow">Digital Forensics</p>
                <h1>Evidence Vault</h1>
            </div>
            <span class="status-pill stable"><i data-lucide="folder-lock"></i> Chain of Custody</span>
        </header>

        <section class="module-grid">
            <article class="panel module-card" th:each="record : ${records}">
                <div class="panel-heading">
                    <div>
                        <span class="section-kicker" th:text="${record.source}">EDR memory capture</span>
                        <h3 th:text="${record.evidenceId}">EVID-APT-2026-001</h3>
                    </div>
                    <span class="severity-label" th:classappend="${record.severity == 'CRITICAL' ? ' critical' : ' high'}" th:text="${record.severity}">HIGH</span>
                </div>
                <p th:text="${record.summary}">Evidence summary</p>
                <div class="detail-block">
                    <strong>Custody Trail</strong>
                    <span th:text="${record.chainOfCustody}">Collected and verified.</span>
                </div>
            </article>
        </section>
    </main>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
