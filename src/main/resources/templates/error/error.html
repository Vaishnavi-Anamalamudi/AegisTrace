<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020503" />
    <title>AegisTrace | Request Error</title>
    <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml" />
    <link href="/css/matrix.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<main class="error-page">
    <section class="error-shell" aria-labelledby="error-title">
        <a class="brand-mark" href="/" aria-label="AegisTrace home">AT</a>
        <p class="eyebrow" th:text="${status != null ? status + ' / Request Error' : 'Request Error'}">Request Error</p>
        <h1 id="error-title">Trace interrupted.</h1>
        <p>AegisTrace could not complete this request. The API returns sanitized errors, and operational details remain in server logs.</p>
        <div class="error-actions">
            <a class="primary-action" href="/dashboard"><i data-lucide="layout-dashboard"></i><span>Open Console</span></a>
            <a class="secondary-action" href="/"><i data-lucide="home"></i><span>Project Overview</span></a>
        </div>
    </section>
</main>
<script>if (window.lucide) { window.lucide.createIcons(); }</script>
</body>
</html>
